# Gamble/accounts/templates/base.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dice Multiplier Game{% endblock %}</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --accent: #ff4500;
            --accent-hover: #ff6347;
            --bg-primary: #111111;
            --bg-surface: #1a1a1a;
            --bg-raised: #222222;
            --border-color: #2a2a2a;
            --text-primary: #ffffff;
            --text-muted: #888888;
            --text-subtle: #555555;
            --danger: #f87171;
            --danger-bg: #2a0f0f;
            --danger-border: #5c1a1a;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(255,69,0,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(255,69,0,0.05) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 460px;
            margin: 60px auto;
            padding: 40px 36px;
            background: var(--bg-surface);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,69,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* --- Typography --- */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 3px;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* --- Form fields --- */
        .form-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control {
            background: var(--bg-raised) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 8px !important;
            padding: 12px 14px !important;
            color: var(--text-primary) !important;
            font-size: 14px !important;
            font-family: 'DM Sans', sans-serif !important;
            transition: border-color 0.15s ease !important;
            box-shadow: none !important;
        }

        .form-control::placeholder { color: var(--text-subtle); }

        .form-control:focus {
            border-color: var(--accent) !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(255,69,0,0.12) !important;
        }

        /* --- Buttons --- */
        .btn-primary {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: 400;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 16px rgba(255,69,0,0.3);
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(255,69,0,0.45);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-secondary {
            background: var(--bg-raised);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 20px;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: background 0.15s, color 0.15s;
        }

        .btn-secondary:hover {
            background: #2c2c2c;
            color: var(--text-primary);
        }

        /* --- Alerts --- */
        .alert-info {
            background: #0f1f2a;
            border: 1px solid #1a3a52;
            border-radius: 8px;
            color: #7ecbf0;
            font-size: 13px;
            padding: 12px 14px;
        }

        .alert-danger {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            border-radius: 8px;
            color: var(--danger);
            font-size: 13px;
            padding: 12px 14px;
        }

        /* --- Links --- */
        a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        .text-center { text-align: center; }
        .mb-4 { margin-bottom: 1.5rem; }
        .mb-3 { margin-bottom: 1rem; }
        .w-100 { width: 100%; }

        .link-row {
            text-align: center;
            font-size: 13px;
            color: var(--text-subtle);
            margin-top: 20px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
